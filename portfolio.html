<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-size: 14px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 0;
      line-height: 1.25;
    }

    a,
    a:visited {
      color: #000000;
      text-decoration: underline;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0;
      padding: 0;
    }

    p {
      margin: 0;
      padding: 0;
    }

    .page {
      max-width: 900px;
      margin: 0;
      padding: 0;
    }

    .intro {
      margin: 0;
      padding: 0;
    }

    .tumblr_posts {
      list-style: none;
      margin: 0;
      padding: 0;
      max-width: 900px;
    }

    .tumblr_post {
      list-style: none;
      margin: 0 0 28px 0;
      padding: 0;
    }

    .tumblr_photo_post img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .tumblr_caption,
    .tumblr_body {
      margin: 0;
      padding: 0;
    }

    .tumblr_caption p,
    .tumblr_body p {
      margin: 0;
      padding: 0;
    }

    .tumblr_title {
      font-size: 14px;
      font-weight: normal;
      margin: 0;
      padding: 0;
    }

    .tumblr_post_date,
    .tumblr_tags {
      display: none;
    }
  </style>
</head>

<body>

  <main class="page">

    <div class="intro">
      <p>
        d<br>
        For commissions or collaborations
        <a href="mailto:your@email.com">your@email.com</a>

      </p>
      <br>
    </div>

    <script src="https://mrdony.tumblr.com/js"></script>

  </main>

</body>
</html>
