<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-size: 14px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 0;
      line-height: 1.25;
    }

    a,
    a:visited {
      color: #000000;
      text-decoration: underline;
    }

    a:hover {
      color: #000000;
      text-decoration: underline;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0;
      padding: 0;
    }

    figure {
      margin: 0;
      padding: 0;
    }

    p {
      margin: 0;
      padding: 0;
    }

    iframe,
    video,
    object,
    embed {
      max-width: 100%;
      display: block;
    }

    .page {
      max-width: 900px;
      margin: 0;
      padding: 0;
    }

    .intro {
      margin: 0;
      padding: 0;
    }

    .post {
      margin: 0 0 28px 0;
      padding: 0;
    }

    .post-title {
      display: none;
    }

    .loading,
    .error {
      margin: 0;
      padding: 0;
    }

    .tumblr_video_container {
      max-width: 100% !important;
    }

    .tumblr_video_container iframe {
      max-width: 100% !important;
    }
  </style>
</head>

<body>

  <main class="page">

    <div class="intro">
      <p>
        Donatas Tretjakovas<br>
        For commissions or collaborations
        <a href="mailto:your@email.com">your@email.com</a>
        <a href="https://www.instagram.com/YOURUSERNAME" target="_blank">instagram</a>
      </p>
      <br>
    </div>

    <div id="posts">
      <p class="loading">Loading portfolio...</p>
    </div>

  </main>

  <script>
    const BLOG = "mrdony";
    const NUMBER_OF_POSTS = 50;

    function cleanTumblrHtml(html) {
      if (!html) return "";

      return html
        .replace(/<script[\s\S]*?<\/script>/gi, "")
        .replace(/<style[\s\S]*?<\/style>/gi, "");
    }

    function renderPhotoPost(post) {
      let html = "";

      if (post.photos && post.photos.length) {
        post.photos.forEach(function(photo) {
          const url =
            photo["photo-url-1280"] ||
            photo["photo-url-500"] ||
            photo["photo-url-400"] ||
            photo["photo-url-250"];

          if (url) {
            html += '<img src="' + url + '" alt="">';
          }
        });
      } else if (post["photo-url-1280"] || post["photo-url-500"]) {
        const url = post["photo-url-1280"] || post["photo-url-500"];
        html += '<img src="' + url + '" alt="">';
      }

      if (post["photo-caption"]) {
        html += cleanTumblrHtml(post["photo-caption"]);
      }

      return html;
    }

    function renderRegularPost(post) {
      let html = "";

      if (post["regular-title"]) {
        html += '<div class="post-title">' + post["regular-title"] + '</div>';
      }

      if (post["regular-body"]) {
        html += cleanTumblrHtml(post["regular-body"]);
      }

      return html;
    }

    function renderVideoPost(post) {
      let html = "";

      if (post["video-player"]) {
        html += post["video-player"];
      }

      if (post["video-caption"]) {
        html += cleanTumblrHtml(post["video-caption"]);
      }

      return html;
    }

    function renderAudioPost(post) {
      let html = "";

      if (post["audio-player"]) {
        html += post["audio-player"];
      }

      if (post["audio-caption"]) {
        html += cleanTumblrHtml(post["audio-caption"]);
      }

      return html;
    }

    function renderPost(post) {
      if (post.type === "photo") return renderPhotoPost(post);
      if (post.type === "regular") return renderRegularPost(post);
      if (post.type === "video") return renderVideoPost(post);
      if (post.type === "audio") return renderAudioPost(post);

      return "";
    }

    function tumblr_api_read(data) {
      const container = document.getElementById("posts");
      container.innerHTML = "";

      if (!data || !data.posts || !data.posts.length) {
        container.innerHTML = '<p class="error">No Tumblr posts found.</p>';
        return;
      }

      data.posts.forEach(function(post) {
        const content = renderPost(post);

        if (!content.trim()) return;

        const article = document.createElement("article");
        article.className = "post";
        article.innerHTML = content;
        container.appendChild(article);
      });
    }

    function loadTumblr() {
      const script = document.createElement("script");
      script.src =
        "https://" +
        BLOG +
        ".tumblr.com/api/read/json?num=" +
        NUMBER_OF_POSTS +
        "&callback=tumblr_api_read";

      script.onerror = function() {
        document.getElementById("posts").innerHTML =
          '<p class="error">Could not load Tumblr posts. Make sure the Tumblr blog is public.</p>';
      };

      document.body.appendChild(script);
    }

    loadTumblr();
  </script>

</body>
</html>
